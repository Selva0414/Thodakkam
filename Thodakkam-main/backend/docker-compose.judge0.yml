version: "3.8"

services:
  # Judge0 Code Execution Engine
  judge0:
    image: judge0/judge0:1.13.0
    volumes:
      - ./judge0:/judge0/run
    ports:
      - "2358:2358"
    privileged: true
    environment:
      - REDIS_HOST=judge0-redis
      - POSTGRES_HOST=judge0-db
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=YourSecurePasswordHere
      - POSTGRES_DB=judge0
    depends_on:
      - judge0-db
      - judge0-redis
    restart: unless-stopped

  # PostgreSQL Database for Judge0
  judge0-db:
    image: postgres:13-alpine
    environment:
      - POSTGRES_USER=judge0
      - POSTGRES_PASSWORD=YourSecurePasswordHere
      - POSTGRES_DB=judge0
    volumes:
      - judge0-postgres-data:/var/lib/postgresql/data
    restart: unless-stopped

  # Redis Cache for Judge0
  judge0-redis:
    image: redis:6-alpine
    command: redis-server --appendonly yes
    volumes:
      - judge0-redis-data:/data
    restart: unless-stopped

volumes:
  judge0-postgres-data:
  judge0-redis-data:

# Usage:
# 1. Run: docker-compose up -d
# 2. Wait 30 seconds for services to start
# 3. Test: curl http://localhost:2358/about
# 4. Update .env: JUDGE0_URL=http://localhost:2358
